<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laura's Garden</title>
  <link rel="stylesheet" href="/static/css/main.css">
  <style>
    .public-layout {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: calc(100vh - 44px);
      padding: 1.5rem;
    }

    .public-header {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .public-header h1 {
      font-size: 18px;
      color: var(--aqua);
      margin-bottom: 0.25rem;
    }

    .public-header p {
      font-size: 12px;
      color: var(--text-muted);
    }

    #tooltip {
      position: fixed;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 12px;
      pointer-events: none;
      display: none;
      z-index: 99;
      min-width: 160px;
    }

    .tt-code   { font-family: 'Silkscreen', monospace; font-size: 8px; color: var(--text-muted); text-transform: uppercase; }
    .tt-name   { font-size: 13px; font-weight: 500; color: var(--text); margin: 2px 0; }
    .tt-latin  { font-size: 11px; color: var(--text-muted); font-style: italic; }
    .tt-hp     { font-size: 11px; margin-top: 4px; }
    .tt-zone   { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

    .public-stats {
      display: flex;
      gap: 2rem;
      margin-bottom: 1.5rem;
    }

    .public-stat {
      text-align: center;
    }

    .public-stat .value {
      font-family: 'Silkscreen', monospace;
      font-size: 20px;
      color: var(--green);
    }

    .public-stat .label {
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <header class="topbar">
    <div class="topbar-title">garden_project · Evere, Brussels</div>
    <div style="font-size:11px;color:var(--text-muted)">SE facing · 4.35 × 8m + patio</div>
  </header>

  <div class="public-layout">

    <div class="public-header">
      <h1>Laura's Garden</h1>
      <p>A living record of a Brussels garden. Hover any plant to learn more.</p>
    </div>

    <div class="public-stats">
      <div class="public-stat">
        <div class="value" id="stat-plants">—</div>
        <div class="label">Active plants</div>
      </div>
      <div class="public-stat">
        <div class="value" id="stat-ok">—</div>
        <div class="label">Thriving</div>
      </div>
      <div class="public-stat">
        <div class="value" id="stat-warning">—</div>
        <div class="label">Need attention</div>
      </div>
    </div>

    <canvas id="garden-canvas" width="780" height="480"></canvas>

  </div>

<div id="map-tooltip"></div>

  <script src="/static/js/map.js"></script>
  <script src="/static/js/public.js"></script>

  <script>
    // Populate stats once plants load
    const origLoad = loadAll;
    loadAll = async function() {
      await origLoad();
      document.getElementById('stat-plants').textContent  = allPlants.length;
      document.getElementById('stat-ok').textContent      = allPlants.filter(p => p.status === 'OK').length;
      document.getElementById('stat-warning').textContent = allPlants.filter(p => p.status === 'WARNING').length;
    };
    loadAll();
  </script>

</body>
</html>
