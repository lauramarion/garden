services:

  db:
    image: postgres:16
    container_name: garden_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: garden
      POSTGRES_USER: garden_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U garden_user -d garden"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: garden_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://garden_user:${DB_PASSWORD}@db:5432/garden
      SECRET_KEY: ${SECRET_KEY}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    volumes:
      - ./backend:/app
      - media_data:/app/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  caddy:
    image: caddy:2
    container_name: garden_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${CADDYFILE:-./Caddyfile.dev}:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend

volumes:
  postgres_data:
  media_data:
  caddy_config:
  caddy_data: